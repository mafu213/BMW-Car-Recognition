<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BMW 四类车型识别系统</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=efficientnet_b0_fix_202606_ui3">
  <script src="./vendor/ort.min.js?v=efficientnet_b0_fix_202606_ui3"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>BMW 四类车型识别系统</h1>
        <p id="modelStatus">EfficientNet-B0 ONNX 加载中...</p>
      </div>
      <span id="readyBadge" class="status">准备中</span>
    </header>

    <section class="result-card" aria-live="polite">
      <div>
        <span>预测车型</span>
        <strong id="predLabel">等待识别</strong>
      </div>
    </section>

    <section class="panel debug-panel">
      <h2>模型加载进度</h2>
      <pre id="debugStatus">等待模型加载。</pre>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>摄像头识别</h2>
      </div>
      <div class="camera-box">
        <video id="video" playsinline autoplay muted></video>
        <div id="cameraPlaceholder" class="placeholder">点击“打开摄像头”</div>
      </div>
      <canvas id="captureCanvas" hidden></canvas>
      <div id="cameraHint" class="warning" hidden>实时摄像头不可用，请使用下方拍照上传功能。</div>
      <div class="button-row">
        <button id="openCameraBtn" type="button">打开摄像头</button>
        <button id="captureBtn" type="button" disabled>拍照识别</button>
        <button id="retakeBtn" type="button">重置</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>拍照上传识别</h2>
        <p>实时摄像头不稳定时，使用 iPhone 原生相机拍照后在网页中识别。</p>
      </div>
      <label class="file-button" for="cameraFile">拍照上传识别</label>
      <input id="cameraFile" type="file" accept="image/*" capture="environment">
      <button id="uploadPredictBtn" type="button" disabled>上传照片识别</button>
      <label class="file-button secondary" for="localFile">本地图片上传识别</label>
      <input id="localFile" type="file" accept="image/*">
      <button id="localPredictBtn" type="button" disabled>识别本地图片</button>
      <button id="testModelBtn" type="button">测试模型推理</button>
    </section>

    <section class="panel preview-panel">
      <h2>图片预览</h2>
      <div class="preview-box">
        <img id="previewImage" alt="拍照或上传图片预览">
        <div id="previewPlaceholder" class="placeholder">暂无图片</div>
      </div>
    </section>

    <section class="panel classes-panel">
      <h2>类别说明</h2>
      <ul>
        <li><strong>28</strong>: BMW 1 Series Coupe 2012</li>
        <li><strong>29</strong>: BMW 3 Series Sedan 2012</li>
        <li><strong>32</strong>: BMW X5 SUV 2007</li>
        <li><strong>37</strong>: BMW X3 SUV 2012</li>
      </ul>
    </section>
  </main>
  <script src="app.js?v=efficientnet_b0_fix_202606_ui3"></script>
</body>
</html>
